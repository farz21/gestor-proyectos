<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Proyectos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">
    
    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Gestor de Proyectos Colaborativo</span>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row g-3 contenedor-tableros">
            
            <div class="col-md-4">
                <div class="columna-crud bg-white border rounded shadow-sm p-3">
                    <h4 class="text-primary border-bottom pb-2 mb-3">1. Proyectos</h4>
                    
                    <div class="mb-3 p-3 bg-light border rounded">
                        <input type="text" id="input-proyecto-nombre" class="form-control form-control-sm mb-2" placeholder="Nombre del proyecto">
                        <input type="text" id="input-proyecto-desc" class="form-control form-control-sm mb-2" placeholder="Descripción breve">
                        <input type="date" id="input-proyecto-fecha" class="form-control form-control-sm mb-2">
                        <button type="button" class="btn btn-primary btn-sm w-100" onclick="crearProyecto()">Nuevo Proyecto</button>
                    </div>

                    <div id="lista-proyectos" class="scroll-lista"></div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="columna-crud bg-white border rounded shadow-sm p-3">
                    <h4 class="text-success border-bottom pb-2 mb-3">2. Tareas</h4>
                    
                    <div class="mb-3 p-3 bg-light border rounded">
                        <input type="text" id="input-tarea-nombre" class="form-control form-control-sm mb-2" placeholder="Nombre de la tarea">
                        <input type="text" id="input-tarea-resp" class="form-control form-control-sm mb-2" placeholder="Responsable">
                        <button type="button" class="btn btn-success btn-sm w-100" onclick="crearTarea()">Agregar Tarea</button>
                    </div>

                    <div id="lista-tareas" class="scroll-lista">
                        <p class="text-muted text-center mt-4">Seleccioná un proyecto para ver sus tareas.</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="columna-crud bg-white border rounded shadow-sm p-3">
                    <h4 class="text-warning border-bottom pb-2 mb-3">3. Comentarios</h4>
                    
                    <div class="mb-3 p-3 bg-light border rounded">
                        <textarea id="input-comentario-texto" class="form-control form-control-sm mb-2" rows="2" placeholder="Escribí un comentario de avance..."></textarea>
                        <button type="button" class="btn btn-warning btn-sm w-100 text-dark" onclick="crearComentario()">Publicar</button>
                    </div>

                    <div id="lista-comentarios" class="scroll-lista">
                        <p class="text-muted text-center mt-4">Seleccioná una tarea para ver el progreso.</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <script src="js/proyectos.js" defer></script>
    <script src="js/tareas.js" defer></script>
    <script src="js/comentarios.js" defer></script>
</body>
</html>
