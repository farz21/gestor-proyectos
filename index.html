<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de Proyectos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Carga de Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1"
          >Gestor de Proyectos Colaborativo</span
        >
      </div>
    </nav>

    <div class="container-fluid px-4">
      <div class="row g-3 contenedor-tableros">
        <div class="col-md-4">
          <div class="columna-crud bg-white border rounded shadow-sm p-3">
            <h4 class="text-primary border-bottom pb-2 mb-3">
              <i class="bi bi-folder2-open me-2"></i>1. Proyectos
            </h4>

            <div class="mb-3">
              <button
                type="button"
                class="btn btn-outline-primary w-100 text-start shadow-sm fw-bold"
                data-bs-toggle="modal"
                data-bs-target="#modalCrearProyecto"
              >
                <i class="bi bi-plus-circle me-2"></i>Añadir un proyecto
              </button>
            </div>

            <div id="lista-proyectos" class="scroll-lista"></div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="columna-crud bg-white border rounded shadow-sm p-3">
            <h4 class="text-success border-bottom pb-2 mb-3">
              <i class="bi bi-list-check me-2"></i>2. Tareas
            </h4>

            <div id="contenedor-boton-tarea" class="mb-3 d-none">
              <button
                type="button"
                class="btn btn-outline-success w-100 text-start shadow-sm fw-bold"
                data-bs-toggle="modal"
                data-bs-target="#modalCrearTarea"
              >
                <i class="bi bi-plus-circle me-2"></i>Añadir una tarea
              </button>
              <div
                id="contenedor-filtro-tarea"
                class="mb-3 d-none animar-entrada"
              >
                <br />
                <select
                  id="filtro-tareas-estado"
                  class="form-select form-select-sm border-success text-success bg-light fw-bold"
                  onchange="filtrarTareas()"
                >
                  <option value="Todos">Ver todas las tareas</option>
                  <option value="Pendiente">Solo Pendientes</option>
                  <option value="En progreso">Solo En Progreso</option>
                  <option value="Completada">Solo Completadas</option>
                </select>
              </div>
            </div>

            <div id="lista-tareas" class="scroll-lista">
              <p class="text-muted text-center mt-4">
                Seleccioná un proyecto para ver sus tareas.
              </p>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="columna-crud bg-white border rounded shadow-sm p-3">
            <h4 class="text-warning border-bottom pb-2 mb-3">
              <i class="bi bi-chat-dots me-2"></i>3. Comentarios
            </h4>

            <div id="contenedor-boton-comentario" class="mb-3 d-none">
              <button
                type="button"
                class="btn btn-outline-warning w-100 text-start shadow-sm fw-bold text-dark"
                data-bs-toggle="modal"
                data-bs-target="#modalCrearComentario"
              >
                <i class="bi bi-plus-circle me-2"></i>Añadir un comentario
              </button>
            </div>

            <div id="lista-comentarios" class="scroll-lista">
              <p class="text-muted text-center mt-4">
                Seleccioná una tarea para ver el progreso.
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="modalCrearProyecto"
      tabindex="-1"
      aria-labelledby="modalCrearProyectoLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title" id="modalCrearProyectoLabel">
              Crear Nuevo Proyecto
            </h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body bg-light">
            <input
              type="text"
              id="modal-proyecto-nombre"
              class="form-control mb-3"
              placeholder="Nombre del proyecto"
            />
            <textarea
              id="modal-proyecto-desc"
              class="form-control mb-3"
              rows="2"
              placeholder="Descripción detallada..."
            ></textarea>

            <label
              for="modal-proyecto-fecha"
              class="form-label mb-1 small fw-bold text-muted"
              >Fecha límite:</label
            >
            <input type="date" id="modal-proyecto-fecha" class="form-control" />
          </div>
          <div class="modal-footer bg-light border-top-0 pt-0">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button
              type="button"
              class="btn btn-primary"
              onclick="crearProyecto()"
            >
              Guardar Proyecto
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="modalEditarProyecto"
      tabindex="-1"
      aria-labelledby="modalEditarProyectoLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
          <div class="modal-header bg-secondary text-white">
            <h5 class="modal-title" id="modalEditarProyectoLabel">
              Editar Proyecto
            </h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body bg-light">
            <input type="hidden" id="modal-editar-id" />

            <input
              type="text"
              id="modal-editar-nombre"
              class="form-control mb-3"
              placeholder="Nombre del proyecto"
            />
            <textarea
              id="modal-editar-desc"
              class="form-control mb-3"
              rows="2"
              placeholder="Descripción detallada..."
            ></textarea>

            <label
              for="modal-editar-fecha"
              class="form-label mb-1 small fw-bold text-muted"
              >Fecha límite:</label
            >
            <input type="date" id="modal-editar-fecha" class="form-control" />
          </div>
          <div class="modal-footer bg-light border-top-0 pt-0">
            <button
              type="button"
              class="btn btn-outline-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button
              type="button"
              class="btn btn-success"
              onclick="guardarEdicionProyecto()"
            >
              Guardar Cambios
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="modalCrearTarea"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
          <div class="modal-header bg-success text-white">
            <h5 class="modal-title">Crear Nueva Tarea</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body bg-light">
            <input
              type="text"
              id="modal-tarea-nombre"
              class="form-control mb-3"
              placeholder="Nombre de la tarea"
            />
            <input
              type="text"
              id="modal-tarea-resp"
              class="form-control"
              placeholder="Responsable"
            />
          </div>
          <div class="modal-footer bg-light border-top-0 pt-0">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button
              type="button"
              class="btn btn-success"
              onclick="crearTarea()"
            >
              Guardar Tarea
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="modalEditarTarea"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
          <div class="modal-header bg-secondary text-white">
            <h5 class="modal-title">Editar Tarea</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body bg-light">
            <input type="hidden" id="modal-editar-tarea-id" />
            <input
              type="text"
              id="modal-editar-tarea-nombre"
              class="form-control mb-3"
              placeholder="Nombre de la tarea"
            />
            <input
              type="text"
              id="modal-editar-tarea-resp"
              class="form-control mb-3"
              placeholder="Responsable"
            />
            <label class="form-label mb-1 small fw-bold text-muted"
              >Estado:</label
            >
            <select id="modal-editar-tarea-estado" class="form-select">
              <option value="Pendiente">Pendiente</option>
              <option value="En progreso">En progreso</option>
              <option value="Completada">Completada</option>
            </select>
          </div>
          <div class="modal-footer bg-light border-top-0 pt-0">
            <button
              type="button"
              class="btn btn-outline-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button
              type="button"
              class="btn btn-success"
              onclick="guardarEdicionTarea()"
            >
              Guardar Cambios
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="modalCrearComentario"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
          <div class="modal-header bg-warning text-dark">
            <h5 class="modal-title">Añadir Comentario</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body bg-light">
            <textarea
              id="modal-comentario-texto"
              class="form-control"
              rows="3"
              placeholder="Escribí un comentario de avance..."
            ></textarea>
          </div>
          <div class="modal-footer bg-light border-top-0 pt-0">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button
              type="button"
              class="btn btn-warning text-dark"
              onclick="crearComentario()"
            >
              Publicar
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="modalEditarComentario"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
          <div class="modal-header bg-secondary text-white">
            <h5 class="modal-title">Editar Comentario</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body bg-light">
            <input type="hidden" id="modal-editar-comentario-id" />
            <textarea
              id="modal-editar-comentario-texto"
              class="form-control"
              rows="3"
            ></textarea>
          </div>
          <div class="modal-footer bg-light border-top-0 pt-0">
            <button
              type="button"
              class="btn btn-outline-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button
              type="button"
              class="btn btn-success"
              onclick="guardarEdicionComentario()"
            >
              Guardar Cambios
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script src="js/proyectos.js" defer></script>
    <script src="js/tareas.js" defer></script>
    <script src="js/comentarios.js" defer></script>
  </body>
</html>
